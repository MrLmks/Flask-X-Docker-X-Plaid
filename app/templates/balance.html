{% extends "base.html" %}

{% block content %}

<h1> Balance : </h1>
<div class="balance-container">
    {{ total }}
</div>
{% for t in transactions %}
<div class="transaction-card">
    <img src="{{ url_for('static', filename=logo[t.billing_entity]) }}" >
    <div class="transaction-info">
        {{ t.billing_entity }}
        {{ t.amount }}
        {{ t.date }}
        {% endfor %}
    </div>
</div>
{% endblock %}
