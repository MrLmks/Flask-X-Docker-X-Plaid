services:
  db:
    image: postgres:17-alpine
    
    container_name: fxdxp-db
    
    restart: always

    networks:
      - private_net
    
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: test
      POSTGRES_DB: fxdxp-db

    volumes:
      - db_data:/var/lib/postgresql/data

  fxdxp-app:
    build:
      context: .
      
      dockerfile: Dockerfile
    
    container_name: fxdxp-app

    networks:
      - private_net
      - public_net

    depends_on:
      - db

  nginx:
    image: nginx:alpine
    
    ports:
      - "80:80"
      - "443:443"
    
    networks:
      - public_net
    
    depends_on:
      - fxdxp-app
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

networks:
  public_net:
    driver: bridge

  private_net:
    driver: bridge
    internal: true

healthcheck:
  test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
  interval: 10s
  retries: 3
  timeout: 5s

volumes:
  db_data: